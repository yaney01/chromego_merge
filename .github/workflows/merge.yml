name: Merge Script

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: chromego-merge-main
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUNBUFFERED: "1"
      MIHOMO_VERSION: "1.19.29"
      MIHOMO_SHA256: "60de76a35a6cbf7b4fa4a20f5c257c24345d1d635ab1aa3877022a1997ef413c"
    steps:
      - name: Checkout repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pinned Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Install pinned Mihomo
        run: |
          curl --fail --location --retry 3 --output mihomo.gz \
            "https://github.com/MetaCubeX/mihomo/releases/download/v${MIHOMO_VERSION}/mihomo-linux-amd64-v${MIHOMO_VERSION}.gz"
          echo "${MIHOMO_SHA256}  mihomo.gz" | sha256sum --check -
          gzip --decompress mihomo.gz
          chmod +x mihomo

      - name: Build Mihomo subscription
        run: python meta_merge.py

      - name: Validate Mihomo subscription
        run: python check_nodes.py --mihomo ./mihomo

      - name: Build universal base64 subscription
        run: python merge.py

      - name: Build sing-box subscription
        run: python sing-box.py

      - name: Commit generated subscriptions
        run: |
          git add sub/merged_proxies_new.yaml sub/base64.txt sub/sing-box.json
          if git diff --cached --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "Update subscriptions at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push origin HEAD:main
